name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium
      
    - name: Run Pytest
      env:
        DUMMYJSON_USERNAME: ${{ secrets.DUMMYJSON_USERNAME }}
        DUMMYJSON_PASSWORD: ${{ secrets.DUMMYJSON_PASSWORD }}
      run: pytest
      
    - name: Install Allure Commandline
      if: always()
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
        tar -zxvf allure-2.32.0.tgz
        sudo ln -s $(pwd)/allure-2.32.0/bin/allure /usr/local/bin/allure

    - name: Generate Allure Report
      if: always()
      run: allure generate allure_results -o allure-report --clean

    - name: Generate Pulse Report
      if: always()
      run: |
        merge-pulse-report
        generate-report
        generate-pulse-report
        generate-email-report
      
    - name: Upload Pytest HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-html-report
        path: reports/
        retention-days: 14

    - name: Upload Raw Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure_results/
        retention-days: 14

    - name: Upload Generated Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-html-report
        path: allure-report/
        retention-days: 14

    - name: Upload Pulse Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pulse-report
        path: pulse-report/
        retention-days: 14    
